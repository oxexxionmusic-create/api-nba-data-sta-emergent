services:
  # Backend API
  - type: web
    name: mi-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGODB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # ... todas tus variables de entorno

  # Frontend estático
  - type: static
    name: mi-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://mi-backend.onrender.com   # cámbialo después de desplegar
